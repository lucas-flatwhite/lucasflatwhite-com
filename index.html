<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lucas.flatwhite</title>
  <link rel="icon" type="image/svg+xml" href="assets/flatwhite.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header class="header">
      <h1 class="heading">lucas.flatwhite</h1>
      <img class="coffee-icon" src="assets/flatwhite.svg" alt="flat white coffee">
    </header>

    <nav class="tree" id="tree"></nav>

    <!-- Toast for command output -->
    <div class="toast" id="toast" hidden></div>

    <div class="command-bar">
      <div class="suggestions" id="suggestions" role="listbox" hidden></div>
      <div class="prompt-line">
        <span class="prompt-symbol" aria-hidden="true">&#10095;</span>
        <input
          type="text"
          id="command-input"
          class="command-input"
          placeholder="type to search or / for commands..."
          autocomplete="off"
          spellcheck="false"
          autofocus
          role="combobox"
          aria-expanded="false"
          aria-controls="suggestions"
          aria-haspopup="listbox"
          aria-label="Search links or run commands"
        >
      </div>
      <div class="hint">
        <span><kbd>&#8593;&#8595;</kbd> navigate</span>
        <span><kbd>&#9166;</kbd> open</span>
        <span><kbd>esc</kbd> close</span>
      </div>
    </div>
  </main>

  <!-- Matrix rain canvas -->
  <canvas id="matrix-canvas"></canvas>

  <script>
    // ── Data ──
    const items = [
      { category: 'github', label: 'lucas-flatwhite', url: 'https://github.com/lucas-flatwhite/' },
      { category: 'twitter x', label: '@lucas_flatwhite', url: 'https://x.com/lucas_flatwhite' },
    ];

    // ── Commands ──
    const commands = [
      { name: '/help',    desc: 'show available commands' },
      { name: '/theme',   desc: 'toggle dark / light mode' },
      { name: '/coffee',  desc: 'brew a fresh flat white' },
      { name: '/time',    desc: 'what time is it?' },
      { name: '/whoami',  desc: 'who am i?' },
      { name: '/matrix',  desc: 'enter the matrix' },
      { name: '/flip',    desc: '(╯°□°)╯︵ ┻━┻' },
      { name: '/clear',   desc: 'clear output' },
    ];

    const coffeeArt = [
      '        ( (',
      '         ) )',
      '      ........',
      '      |      |]',
      '      \\      /',
      '       `----\'',
      '',
      '  brewing flat white...',
      '  done. enjoy.',
    ];

    // ── Toast ──
    const toastEl = document.getElementById('toast');
    let toastTimer = null;
    function showToast(html, duration = 4000) {
      clearTimeout(toastTimer);
      toastEl.innerHTML = html;
      toastEl.hidden = false;
      toastEl.classList.remove('toast-out');
      toastEl.classList.add('toast-in');
      if (duration > 0) {
        toastTimer = setTimeout(() => hideToast(), duration);
      }
    }
    function hideToast() {
      toastEl.classList.remove('toast-in');
      toastEl.classList.add('toast-out');
      setTimeout(() => { toastEl.hidden = true; }, 300);
    }

    // ── Command handlers ──
    function runCommand(name) {
      switch (name) {
        case '/help':
          const rows = commands.map(c =>
            `<span class="toast-cmd">${c.name}</span> <span class="toast-desc">${c.desc}</span>`
          ).join('\n');
          showToast(`<pre>${rows}</pre>`, 0);
          break;

        case '/theme':
          document.body.classList.toggle('dark');
          const mode = document.body.classList.contains('dark') ? 'dark' : 'light';
          showToast(`<pre>switched to ${mode} mode</pre>`);
          break;

        case '/coffee':
          showToast(`<pre>${coffeeArt.join('\n')}</pre>`, 5000);
          const icon = document.querySelector('.coffee-icon');
          icon.classList.add('brewing');
          setTimeout(() => icon.classList.remove('brewing'), 2000);
          break;

        case '/time': {
          const now = new Date();
          const h = now.getHours().toString().padStart(2, '0');
          const m = now.getMinutes().toString().padStart(2, '0');
          const s = now.getSeconds().toString().padStart(2, '0');
          const greeting = now.getHours() < 12 ? 'good morning' :
                           now.getHours() < 18 ? 'good afternoon' : 'good evening';
          showToast(`<pre>${h}:${m}:${s}\n${greeting}, lucas.</pre>`);
          break;
        }

        case '/whoami':
          showToast(`<pre>lucas.flatwhite\na developer who loves flat whites.\ncurrently: building cool things.</pre>`, 5000);
          break;

        case '/matrix':
          startMatrix();
          break;

        case '/flip':
          showToast(`<pre style="font-size:1.5rem;text-align:center">(╯°□°)╯︵ ┻━┻</pre>`, 3000);
          document.querySelector('main').classList.add('flip-shake');
          setTimeout(() => document.querySelector('main').classList.remove('flip-shake'), 600);
          break;

        case '/clear':
          hideToast();
          stopMatrix();
          break;
      }
    }

    // ── Matrix rain ──
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    let matrixInterval = null;
    let matrixDrops = [];

    function startMatrix() {
      if (matrixInterval) return;
      canvas.style.display = 'block';
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const fontSize = 14;
      const cols = Math.floor(canvas.width / fontSize);
      matrixDrops = Array(cols).fill(1);
      const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789';

      matrixInterval = setInterval(() => {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#0F0';
        ctx.font = fontSize + 'px monospace';

        for (let i = 0; i < matrixDrops.length; i++) {
          const char = chars[Math.floor(Math.random() * chars.length)];
          ctx.fillText(char, i * fontSize, matrixDrops[i] * fontSize);
          if (matrixDrops[i] * fontSize > canvas.height && Math.random() > 0.975)
            matrixDrops[i] = 0;
          matrixDrops[i]++;
        }
      }, 35);

      showToast('<pre>wake up, lucas...\nthe matrix has you.\n\ntype /clear to exit.</pre>', 0);
    }

    function stopMatrix() {
      if (matrixInterval) {
        clearInterval(matrixInterval);
        matrixInterval = null;
      }
      canvas.style.display = 'none';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    window.addEventListener('resize', () => {
      if (matrixInterval) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
    });

    // ── Build tree from data ──
    const treeEl = document.getElementById('tree');
    function buildTree() {
      const groups = {};
      items.forEach(item => {
        if (!groups[item.category]) groups[item.category] = [];
        groups[item.category].push(item);
      });
      const cats = Object.keys(groups);
      const s = (chars) => `<span class="tree-branch-char">${chars}</span>`;
      const c = (name) => `<span class="tree-category">${name}</span>`;

      let lines = [s('.')];
      cats.forEach((cat, ci) => {
        const isLast = ci === cats.length - 1;
        lines.push(s(isLast ? '└── ' : '├── ') + c(cat));
        const children = groups[cat];
        children.forEach((child, li) => {
          const branch = isLast ? '    ' : '│   ';
          const leaf = li === children.length - 1 ? '└── ' : '├── ';
          lines.push(s(branch + leaf) + `<a href="${child.url}" target="_blank" rel="noopener">${child.label}</a>`);
        });
      });
      const pre = document.createElement('pre');
      pre.className = 'tree-content';
      pre.innerHTML = lines.join('\n');
      treeEl.appendChild(pre);
    }
    buildTree();

    // ── Fuzzy match ──
    function fuzzyMatch(str, query) {
      const s = str.toLowerCase();
      const q = query.toLowerCase();
      let si = 0;
      const matches = [];
      for (let qi = 0; qi < q.length; qi++) {
        const found = s.indexOf(q[qi], si);
        if (found === -1) return null;
        matches.push(found);
        si = found + 1;
      }
      return matches;
    }

    function fuzzyHighlight(str, matchIndices) {
      let result = '';
      let last = 0;
      matchIndices.forEach(idx => {
        result += escapeHtml(str.slice(last, idx));
        result += '<span class="match">' + escapeHtml(str[idx]) + '</span>';
        last = idx + 1;
      });
      result += escapeHtml(str.slice(last));
      return result;
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ── Input / Suggestions ──
    const input = document.getElementById('command-input');
    const suggestionsEl = document.getElementById('suggestions');
    let filtered = [];
    let selectedIdx = -1;
    let mode = 'search'; // 'search' or 'command'

    function render() {
      if (filtered.length === 0) {
        suggestionsEl.hidden = true;
        input.setAttribute('aria-expanded', 'false');
        input.removeAttribute('aria-activedescendant');
        return;
      }
      suggestionsEl.hidden = false;
      input.setAttribute('aria-expanded', 'true');

      if (mode === 'command') {
        suggestionsEl.innerHTML = filtered.map((cmd, i) => {
          const id = 'suggestion-' + i;
          const activeClass = i === selectedIdx ? ' active' : '';
          return `<div class="suggestion-item${activeClass}" id="${id}" role="option" aria-selected="${i === selectedIdx}">` +
            `<span class="suggestion-cmd">${cmd.highlighted}</span>` +
            `<span class="suggestion-desc">${escapeHtml(cmd.desc)}</span>` +
            `</div>`;
        }).join('');
      } else {
        suggestionsEl.innerHTML = filtered.map((item, i) => {
          const id = 'suggestion-' + i;
          const activeClass = i === selectedIdx ? ' active' : '';
          return `<div class="suggestion-item${activeClass}" id="${id}" role="option" aria-selected="${i === selectedIdx}">` +
            `<span class="suggestion-category">${escapeHtml(item.category)} /</span> ` +
            `<span class="suggestion-label">${item.highlighted}</span>` +
            `</div>`;
        }).join('');
      }

      if (selectedIdx >= 0) {
        input.setAttribute('aria-activedescendant', 'suggestion-' + selectedIdx);
      } else {
        input.removeAttribute('aria-activedescendant');
      }
    }

    function filter() {
      const q = input.value.trim();

      // Command mode: starts with /
      if (q.startsWith('/')) {
        mode = 'command';
        const search = q.toLowerCase();
        filtered = commands
          .filter(c => c.name.startsWith(search) || c.desc.toLowerCase().includes(search.slice(1)))
          .map(c => {
            const match = fuzzyMatch(c.name, q);
            return {
              ...c,
              highlighted: match ? fuzzyHighlight(c.name, match) : escapeHtml(c.name),
            };
          });
        selectedIdx = filtered.length > 0 ? 0 : -1;
        render();
        return;
      }

      // Search mode
      mode = 'search';
      if (!q) {
        filtered = items.map(item => ({
          ...item,
          highlighted: escapeHtml(item.label),
        }));
        selectedIdx = filtered.length > 0 ? 0 : -1;
        render();
        return;
      }
      filtered = [];
      items.forEach(item => {
        const full = item.category + ' ' + item.label;
        const match = fuzzyMatch(full, q);
        if (match) {
          const offset = item.category.length + 1;
          const labelMatches = match.filter(i => i >= offset).map(i => i - offset);
          filtered.push({
            ...item,
            highlighted: labelMatches.length > 0 ? fuzzyHighlight(item.label, labelMatches) : escapeHtml(item.label),
            score: match.length,
          });
        }
      });
      selectedIdx = filtered.length > 0 ? 0 : -1;
      render();
    }

    function execute() {
      if (selectedIdx < 0) return;
      if (mode === 'command') {
        runCommand(filtered[selectedIdx].name);
      } else {
        window.open(filtered[selectedIdx].url, '_blank');
      }
      input.value = '';
      filtered = [];
      selectedIdx = -1;
      render();
    }

    input.addEventListener('input', filter);
    input.addEventListener('focus', filter);
    input.addEventListener('blur', () => {
      setTimeout(() => {
        filtered = [];
        selectedIdx = -1;
        render();
      }, 150);
    });

    input.addEventListener('keydown', (e) => {
      if (filtered.length === 0) {
        if (e.key === 'Escape') { hideToast(); stopMatrix(); }
        return;
      }

      if (e.key === 'ArrowUp') {
        e.preventDefault();
        selectedIdx = selectedIdx <= 0 ? filtered.length - 1 : selectedIdx - 1;
        render();
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        selectedIdx = selectedIdx >= filtered.length - 1 ? 0 : selectedIdx + 1;
        render();
      } else if (e.key === 'Enter' && selectedIdx >= 0) {
        e.preventDefault();
        execute();
      } else if (e.key === 'Escape') {
        input.value = '';
        input.blur();
        filtered = [];
        selectedIdx = -1;
        render();
      }
    });

    suggestionsEl.addEventListener('mousedown', (e) => {
      e.preventDefault();
      const item = e.target.closest('.suggestion-item');
      if (!item) return;
      const idx = [...suggestionsEl.children].indexOf(item);
      if (idx >= 0) {
        selectedIdx = idx;
        execute();
      }
    });
  </script>
</body>
</html>
