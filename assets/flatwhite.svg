<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="48" height="48" shape-rendering="crispEdges">
  <!-- Saucer shadow -->
  <rect x="3" y="14" width="11" height="1" fill="#bfb49a" opacity="0.4"/>
  <!-- Saucer -->
  <rect x="1" y="12" width="14" height="2" fill="#d4c5a9"/>
  <rect x="2" y="11" width="12" height="1" fill="#ddd0b8"/>
  <!-- Cup body -->
  <rect x="3" y="4" width="10" height="8" fill="#e8ddc8"/>
  <rect x="2" y="5" width="1" height="6" fill="#ddd0b8"/>
  <rect x="13" y="5" width="1" height="6" fill="#ddd0b8"/>
  <!-- Cup rim -->
  <rect x="3" y="4" width="10" height="1" fill="#f0e8d6"/>
  <!-- Handle -->
  <rect x="14" y="6" width="1" height="1" fill="#c9b99a"/>
  <rect x="15" y="6" width="1" height="4" fill="#c9b99a"/>
  <rect x="14" y="9" width="1" height="1" fill="#c9b99a"/>
  <!-- Coffee surface -->
  <rect x="4" y="5" width="8" height="5" fill="#3d2415"/>
  <!-- Crema ring -->
  <rect x="4" y="5" width="8" height="1" fill="#6b4226"/>
  <rect x="4" y="9" width="8" height="1" fill="#6b4226"/>
  <rect x="4" y="6" width="1" height="3" fill="#6b4226"/>
  <rect x="11" y="6" width="1" height="3" fill="#6b4226"/>
  <!-- Latte art heart -->
  <rect x="6" y="6" width="1" height="1" fill="#f0e6d2"/>
  <rect x="9" y="6" width="1" height="1" fill="#f0e6d2"/>
  <rect x="6" y="7" width="2" height="1" fill="#f0e6d2"/>
  <rect x="8" y="7" width="2" height="1" fill="#f0e6d2"/>
  <rect x="7" y="8" width="2" height="1" fill="#f0e6d2"/>
</svg>
